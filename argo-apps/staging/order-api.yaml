apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mohamedmagdy122/ecommerce-gitops
    targetRevision: main
    path: helm-backend
    helm:
      valueFiles:
        - ../../environments/stg/order-api.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ecommerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
