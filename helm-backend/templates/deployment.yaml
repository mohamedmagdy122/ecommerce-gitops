apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      {{- if .Values.migration.enabled }}
      initContainers:
        - name: db-migrate
          image: mysql:8.0
          command:
            - sh
            - -c
            - |
              until mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" -e "SELECT 1"; do
                echo "Waiting for MySQL..."
                sleep 3
              done
              mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" < /docker-entrypoint-initdb.d/01-schema.sql
          env:
            - name: DB_HOST
              value: {{ .Values.migration.dbHost }}
            - name: DB_USER
              value: {{ .Values.migration.dbUser }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: {{ .Values.migration.dbPassEnvKey }}
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            {{- if .Values.externalSecret.enabled }}
            - secretRef:
                name: {{ .Release.Name }}-secret
            {{- end }}
          volumeMounts:
            - name: logs
              mountPath: {{ .Values.pvc.mountPath }}
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-logs
        {{- if .Values.migration.enabled }}
        - name: init-sql
          configMap:
            name: db-init-sql
        {{- end }}
